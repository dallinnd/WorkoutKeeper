<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkoutKeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">
        <header>
            <h1>WorkoutKeeper</h1>
            <input type="text" id="workout-name" placeholder="Name Your Workout...">
            
            <div id="theme-selector">
                <div class="theme-dot purple" data-theme="purple"></div>
                <div class="theme-dot teal" data-theme="teal"></div>
                <div class="theme-dot orange" data-theme="orange"></div>
                <div class="theme-dot pink" data-theme="pink"></div>
                <div class="theme-dot blue" data-theme="blue"></div>
                <div class="theme-dot black" data-theme="black"></div>
            </div>
        </header>

        <main id="sets-container"></main>

        <div class="bottom-controls">
            <button id="add-set-btn">+ New Set</button>
            <div class="time-picker">
                <label>Estimated Time</label>
                <select id="time-select">
                    <option value="5m">5 minutes</option>
                    <option value="10m">10 minutes</option>
                    <option value="20m">15-20 minutes</option>
                    <option value="30m">20-30 minutes</option>
                    <option value="45m">30-45 minutes</option>
                    <option value="60m">45-60 minutes</option>
                    <option value="90m">1-1.5 hours</option>
                    <option value="120m" selected>1.5-2 hours</option>
                </select>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <input type="text" id="modal-name" placeholder="Name Exercise">
            
            <div class="modal-toggles">
                <button id="toggle-reps" class="active">REPS<br><small>count</small></button>
                <button id="toggle-timed">TIMED<br><small>seconds</small></button>
            </div>

            <div class="modal-counter">
                <button id="counter-minus">-</button>
                <span id="counter-value">10</span>
                <button id="counter-plus">+</button>
            </div>

            <div class="modal-actions">
                <button id="modal-save">SAVE</button>
                <button id="modal-close">🗑️</button>
            </div>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
