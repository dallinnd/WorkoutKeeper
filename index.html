<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkoutKeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">

        <section id="view-calendar" class="view active">
            <header class="schedule-header">
                <h1>Schedule</h1>
            </header>

            <div id="daily-schedule">
                <h2 id="selected-date-title">Today</h2>
                <div id="scheduled-workouts-list">
                    </div>
                <button id="btn-schedule-new" class="btn-ghost hidden">+ Schedule Workout</button>
            </div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="month-display">April</h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid">
                    </div>
            </div>
        </section>

        <section id="view-builder" class="view hidden">
            <header>
                <h1>Name</h1>
                <p>Color Theme</p>
                <div id="theme-selector">
                    <div class="theme-dot purple" data-theme="purple"></div>
                    <div class="theme-dot teal" data-theme="teal"></div>
                    <div class="theme-dot orange" data-theme="orange"></div>
                    <div class="theme-dot pink" data-theme="pink"></div>
                    <div class="theme-dot blue" data-theme="blue"></div>
                    <div class="theme-dot black" data-theme="black"></div>
                </div>
            </header>
            
            <input type="text" id="workout-name" placeholder="Name Your Workout..." class="hidden">
            <main id="sets-container"></main>
            
            <button id="add-set-btn" class="btn-new-set">+ New Set</button>
            
            <div class="time-picker-inline">
                <label>Estimated Time</label>
                <select id="time-select">
                    <option value="5">5 mins</option>
                    <option value="10">10 mins</option>
                    <option value="20">15-20 mins</option>
                    <option value="30">20-30 mins</option>
                    <option value="45">30-45 mins</option>
                    <option value="60">45-60 mins</option>
                    <option value="90">1-1.5 hours</option>
                    <option value="120" selected>1.5-2 hours</option>
                </select>
            </div>

            <button id="save-to-library-btn" class="btn-save-workout">Save to Library</button>
        </section>

        <section id="view-active" class="view hidden">
            <h2 id="active-workout-title">Workout</h2>
            <div id="active-sets-container"></div>
            <div class="execution-footer">
                <div class="progress-bar-bg"><div id="active-progress-bar"></div></div>
                <div class="flex-row mt-10">
                    <button id="btn-cancel-workout" class="btn-secondary">Quit</button>
                    <button id="btn-finish-workout" class="btn-primary">Finish</button>
                </div>
            </div>
        </section>

        <nav id="bottom-nav">
            <button class="nav-btn" data-target="view-builder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="nav-btn active" data-target="view-calendar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button class="nav-btn" data-target="view-profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </button>
        </nav>
    </div>

    <div id="schedule-modal" class="modal-overlay hidden">
        <div class="modal-content text-center">
            <h3>Select Workout</h3>
            <div id="library-list"></div>
            <button id="close-schedule-modal" class="btn-secondary mt-10 full-width">Cancel</button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="color: black; margin-top: 0;">Name Exercise</h3>
            <input type="text" id="modal-name" placeholder="Pushups">
            <div class="modal-toggles">
                <button id="toggle-reps" class="active">REPS<br><small>count</small></button>
                <button id="toggle-timed">TIMED<br><small>seconds</small></button>
            </div>
            <div id="time-unit-container" class="hidden">
                <button id="unit-sec" class="unit-btn active">Seconds</button>
                <button id="unit-min" class="unit-btn">Minutes</button>
            </div>
            <div class="modal-counter">
                <button id="counter-minus">-</button>
                <span id="counter-value">10</span>
                <button id="counter-plus">+</button>
            </div>
            <div class="flex-row">
                <button id="modal-save" class="btn-save-green flex-3">SAVE</button>
                <button id="modal-close" class="btn-delete-red flex-1">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
