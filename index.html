<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorkoutKeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-wrapper">

        <section id="view-calendar" class="view active">
            <header class="schedule-header">
                <h1>Schedule</h1>
            </header>

            <div id="daily-schedule">
                <h2 id="selected-date-title">Today</h2>
                <div id="scheduled-workouts-list"></div>
                <button id="btn-schedule-new" class="btn-ghost hidden">+ Schedule Workout</button>
            </div>

            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prev-month">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <h2 id="month-display">April 2026</h2>
                    <button id="next-month">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
                <div class="calendar-grid-header">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>
        </section>

        <section id="view-preview" class="view hidden">
            <div class="preview-nav">
                <button id="btn-back-schedule" class="btn-circle-back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <button id="btn-start-workout" class="btn-start-pill">Start</button>
            </div>
            
            <div class="preview-card">
                <p class="section-label">Overview</p>
                <h2 id="preview-title" class="theme-text-color">Workout Name</h2>
                
                <p class="section-label mt-15">Estimated Time</p>
                <div class="est-time-block">
                    <div class="time-bubble" id="preview-time">1.5 - 2</div>
                    <span class="time-label">hours</span>
                </div>
                <div id="preview-sets-container"></div>
            </div>
        </section>

        <section id="view-builder" class="view hidden">
            <header>
                <input type="text" id="workout-name" placeholder="Name Your Workout" class="heading-input">
                <p style="color: #888; margin-bottom: 10px;">Color Theme</p>
                <div id="theme-selector">
                    <div class="theme-dot purple" data-theme="purple"></div>
                    <div class="theme-dot teal" data-theme="teal"></div>
                    <div class="theme-dot orange" data-theme="orange"></div>
                    <div class="theme-dot pink" data-theme="pink"></div>
                    <div class="theme-dot blue" data-theme="blue"></div>
                    <div class="theme-dot black" data-theme="black"></div>
                </div>
            </header>
            
            <main id="sets-container"></main>
            <button id="add-set-btn" class="btn-new-set">+ New Set</button>
            
            <div class="time-picker-inline">
                <label>Estimated Time</label>
                <select id="time-select">
                    <option value="5 mins">5 mins</option>
                    <option value="10 mins">10 mins</option>
                    <option value="15-20 mins">15-20 mins</option>
                    <option value="30-45 mins">30-45 mins</option>
                    <option value="1.5 - 2 hours" selected>1.5 - 2 hours</option>
                </select>
            </div>
            <button id="save-to-library-btn" class="btn-save-green full-width">Save to Library</button>
        </section>

        <section id="view-profile" class="view hidden">
            <header class="schedule-header">
                <h1 style="color: black;">My Workouts</h1>
            </header>
            <div id="profile-library-list">
                </div>
        </section>

        <section id="view-active" class="view hidden">
            <header class="active-header">
                <h2 id="active-workout-title" class="theme-text-color">Workout</h2>
                <button id="btn-cancel-workout" class="btn-ghost-small">Quit</button>
            </header>
            
            <div class="active-scroll-area">
                <div id="active-sets-container"></div>
            </div>
            
            <div class="execution-footer">
                <div class="progress-bar-bg"><div id="active-progress-bar"></div></div>
                <div class="flex-row">
                    <button id="btn-finish-workout" class="btn-save-green full-width">Finish Workout</button>
                </div>
            </div>
        </section>

        <nav id="bottom-nav">
            <button class="nav-btn" data-target="view-builder">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button class="nav-btn active" data-target="view-calendar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button class="nav-btn" data-target="view-profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
        </nav>
    </div>

    <div id="schedule-modal" class="modal-overlay hidden">
        <div class="modal-content text-center">
            <h3 style="color: black; margin-top:0;">Select Workout</h3>
            <div id="library-list"></div>
            <button id="close-schedule-modal" class="btn-delete-red full-width mt-10">Cancel</button>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-content">
            <h3 style="color: black; margin-top: 0;">Exercise Name</h3>
            <input type="text" id="modal-name" placeholder="Pushups">
            
            <div class="modal-toggles">
                <button id="toggle-reps" class="active">REPS</button>
                <button id="toggle-timed">TIMED</button>
            </div>
            
            <div id="input-reps-container" class="input-container">
                <input type="number" id="modal-val-reps" class="mega-input" value="10" min="1">
                <span style="color: black; font-weight: bold; margin-left: 10px;">reps</span>
            </div>

            <div id="input-time-container" class="input-container hidden">
                <div class="time-col">
                    <input type="number" id="modal-val-min" class="mega-input" value="00" min="0">
                    <small style="color: black;">min</small>
                </div>
                <span class="mega-colon">:</span>
                <div class="time-col">
                    <input type="number" id="modal-val-sec" class="mega-input" value="30" min="0" max="59">
                    <small style="color: black;">sec</small>
                </div>
            </div>

            <div class="flex-row">
                <button id="modal-save" class="btn-save-green flex-3">SAVE</button>
                <button id="modal-close" class="btn-delete-red flex-1">X</button>
            </div>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
